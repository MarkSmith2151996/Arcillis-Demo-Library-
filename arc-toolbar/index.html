<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARC</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <div class="titlebar">
      <span class="titlebar-name" id="titlebar-label">ARC</span>
      <div class="titlebar-buttons">
        <button class="titlebar-btn" id="minimize">&minus;</button>
        <button class="titlebar-btn" id="close">&times;</button>
      </div>
    </div>

    <div id="layout-nokia" class="layout"></div>
    <div id="layout-strip" class="layout hidden"></div>
    <div id="layout-chat" class="layout hidden"></div>
    <div id="admin-overlay" class="hidden"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
